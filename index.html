function AdminView({clients, setClients, catalogue, setCatalogue, showToast}) {
const [tab,    setTab]   = useState(“clients”);
const [cModal, setCModal]= useState(null);
const [pModal, setPModal]= useState(null);
const [cForm,  setCForm] = useState({name:””,contact:””,fondateur:false,actif:true});
const [pForm,  setPForm] = useState({name:””,emoji:“🥦”,price:””,unit:“kg”,cat:“Légumes”,actif:true});

const openC=(c)=>{setCForm(c===“new”?{name:””,contact:””,fondateur:false,actif:true}:{name:c.name,contact:c.contact,fondateur:c.fondateur,actif:c.actif});setCModal(c);};
const saveC=()=>{
if(!cForm.name.trim())return;
if(cModal===“new”){setClients(p=>[…p,{id:Date.now(),…cForm}]);showToast(“✅ Client ajouté !”);}
else{setClients(p=>p.map(c=>c.id===cModal.id?{…c,…cForm}:c));showToast(“✅ Mis à jour !”);}
setCModal(null);
};
const openP=(p)=>{setPForm(p===“new”?{name:””,emoji:“🥦”,price:””,unit:“kg”,cat:“Légumes”,actif:true}:{name:p.name,emoji:p.emoji,price:String(p.price),unit:p.unit,cat:p.cat,actif:p.actif});setPModal(p);};
const saveP=()=>{
if(!pForm.name.trim()||!pForm.price)return;
const data={…pForm,price:parseFloat(pForm.price)};
if(pModal===“new”){setCatalogue(p=>[…p,{id:Date.now(),…data}]);showToast(“✅ Produit ajouté !”);}
else{setCatalogue(p=>p.map(x=>x.id===pModal.id?{…x,…data}:x));showToast(“✅ Mis à jour !”);}
setPModal(null);
};

return (
<div className="slide-in">
<div className="bebas" style={{fontSize:36,lineHeight:1,marginBottom:4}}>Administration</div>
<p style={{color:“var(–gray)”,fontSize:13,marginBottom:18}}>Gérez vos clients et votre catalogue.</p>

))}
</div>
